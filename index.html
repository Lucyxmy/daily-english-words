<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#667eea">
<title>每日英语单词 - 五四学制</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #333;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }
  header {
    text-align: center;
    padding: 16px 0 6px;
    color: #fff;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  header .date {
    font-size: 14px;
    opacity: 0.85;
    margin-top: 4px;
  }
  header .subtitle {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 2px;
  }
  .grade-selector {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 12px 0 8px;
    flex-wrap: wrap;
  }
  .grade-selector button {
    padding: 6px 16px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .grade-selector button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .grade-selector button.active {
    background: #fff;
    color: #667eea;
    border-color: #fff;
  }
  .category-selector button {
    border-color: rgba(255,255,255,0.3);
    font-size: 13px;
    padding: 5px 14px;
  }
  .category-selector button.active {
    background: rgba(255,215,0,0.25);
    border-color: #ffd700;
    color: #ffd700;
  }
  .progress-section {
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 10px 16px;
    margin: 12px 0;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
    margin: 0 12px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #ffd700;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }
  .card-area {
    position: relative;
    min-height: 300px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 24px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .card.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .word-number {
    font-size: 14px;
    color: #999;
    margin-bottom: 16px;
  }
  .word-english {
    font-size: 40px;
    font-weight: 700;
    color: #333;
    margin: 16px 0;
    letter-spacing: 1px;
    cursor: pointer;
    user-select: none;
  }
  .word-phonetic {
    font-size: 16px;
    color: #999;
    margin-bottom: 6px;
  }
  .word-chinese {
    font-size: 28px;
    font-weight: 600;
    color: #667eea;
    margin: 14px 0 6px;
    min-height: 40px;
    transition: opacity 0.3s;
  }
  .word-chinese.hidden { opacity: 0; }
  .word-chinese:not(.hidden) { opacity: 1; }
  .hint-text {
    font-size: 13px;
    color: #bbb;
    margin-top: 6px;
  }
  .btn-sound {
    display: inline-block;
    background: #f0f0f5;
    border: none;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    line-height: 48px;
    font-size: 22px;
    cursor: pointer;
    margin: 8px 0;
    transition: background 0.2s;
  }
  .btn-sound:hover { background: #e0e0eb; }
  .btn-sound:active { transform: scale(0.95); }
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
  }
  .actions button {
    flex: 1;
    max-width: 160px;
    padding: 14px 0;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .actions button:active { transform: scale(0.96); }
  .btn-know { background: #52c41a; color: #fff; }
  .btn-dunno { background: #ff4d4f; color: #fff; }
  .btn-know:disabled, .btn-dunno:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-section {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: none;
  }
  .result-section.active { display: block; animation: fadeIn 0.3s ease; }
  .result-section h2 { font-size: 22px; margin-bottom: 6px; }
  .result-emoji { font-size: 48px; margin-bottom: 6px; }
  .result-score { font-size: 44px; font-weight: 700; color: #667eea; }
  .result-detail { margin-top: 16px; text-align: left; max-height: 300px; overflow-y: auto; }
  .result-word {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 15px;
  }
  .result-word .en { font-weight: 600; }
  .result-word .cn { color: #999; }
  .result-word .status { font-size: 18px; }
  .btn-reset {
    margin-top: 16px;
    padding: 12px 32px;
    border: 2px solid #667eea;
    border-radius: 14px;
    background: #fff;
    color: #667eea;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-reset:hover { background: #667eea; color: #fff; }
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-top: 16px;
  }
  .empty-state {
    background: #fff;
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { color: #999; font-size: 15px; line-height: 1.6; }

  /* ---- 模式选择 ---- */
  .mode-selector {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin: 6px 0 10px;
  }
  .mode-selector button {
    padding: 5px 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-selector button.active {
    background: rgba(255,255,255,0.2);
    border-color: #fff;
    color: #fff;
  }

  /* ---- 语音交互 ---- */
  .mic-area {
    margin: 12px 0 8px;
    position: relative;
  }
  .mic-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    font-size: 28px;
    cursor: pointer;
    background: #f0f0f5;
    transition: all 0.2s;
    position: relative;
  }
  .mic-btn:active { transform: scale(0.92); }
  .mic-btn.listening {
    background: #ff4d4f;
    color: #fff;
    animation: pulse 1s ease-in-out infinite;
  }
  .mic-btn.success { background: #52c41a; color: #fff; animation: none; }
  .mic-btn.fail { background: #ff4d4f; color: #fff; animation: none; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,77,79,0.5); }
    50% { box-shadow: 0 0 0 16px rgba(255,77,79,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,77,79,0); }
  }
  .speech-status {
    font-size: 14px;
    color: #999;
    margin-top: 6px;
    min-height: 22px;
  }
  .speech-result {
    font-size: 18px;
    font-weight: 600;
    color: #333;
    margin-top: 4px;
    min-height: 28px;
  }
  .retry-area {
    margin-top: 14px;
  }
  .btn-retry {
    padding: 8px 24px;
    border: 2px solid #ff4d4f;
    border-radius: 12px;
    background: #fff;
    color: #ff4d4f;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin: 0 6px;
  }
  .btn-next-word {
    padding: 8px 24px;
    border: 2px solid #52c41a;
    border-radius: 12px;
    background: #fff;
    color: #52c41a;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin: 0 6px;
  }
  .speech-supported-note {
    font-size: 12px;
    color: #ccc;
    margin-top: 8px;
  }

  /* ---- 手机适配 ---- */
  .container {
    padding: 16px 16px 40px;
    padding: 16px env(safe-area-inset-right, 16px) calc(40px + env(safe-area-inset-bottom, 0px)) env(safe-area-inset-left, 16px);
  }
  .dark-toggle {
    top: 12px;
    top: calc(12px + env(safe-area-inset-top, 0px));
    right: 12px;
    right: calc(12px + env(safe-area-inset-right, 0px));
  }
  button, .word-english, .mic-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .actions button {
    min-height: 48px;
  }
  .grade-selector button, .mode-selector button {
    min-height: 36px;
  }
  .btn-sound {
    min-height: 48px;
    min-width: 48px;
  }
  .mic-btn {
    min-height: 64px;
    min-width: 64px;
  }
  .btn-reset {
    min-height: 44px;
  }

  /* ---- 深色模式 ---- */
  .dark-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 100;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dark-toggle:hover { background: rgba(255,255,255,0.3); }
  body.dark {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  body.dark .card,
  body.dark .result-section,
  body.dark .empty-state {
    background: #1e1e2f;
    color: #e0e0e0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  body.dark .word-english { color: #e0e0e0; }
  body.dark .word-chinese { color: #7c8cf0; }
  body.dark .word-number { color: #888; }
  body.dark .word-phonetic { color: #777; }
  body.dark .hint-text { color: #666; }
  body.dark .result-section h2 { color: #e0e0e0; }
  body.dark .result-word { border-bottom-color: #2a2a3e; }
  body.dark .result-word .cn { color: #888; }
  body.dark .btn-sound { background: #2a2a3e; color: #e0e0e0; }
  body.dark .btn-sound:hover { background: #3a3a4e; }
  body.dark .btn-reset { border-color: #7c8cf0; color: #7c8cf0; background: transparent; }
  body.dark .btn-reset:hover { background: #7c8cf0; color: #fff; }
  body.dark .btn-retry { border-color: #ff6b6b; color: #ff6b6b; background: transparent; }
  body.dark .btn-next-word { border-color: #51cf66; color: #51cf66; background: transparent; }
  body.dark .mic-btn { background: #2a2a3e; color: #e0e0e0; }
  body.dark .progress-text { color: #ccc; }
</style>
</head>
<body>
<div class="container">
  <button class="dark-toggle" id="darkToggle" title="切换深色模式">🌙</button>

  <header>
    <h1>📖 每日英语单词</h1>
    <div class="date" id="dateDisplay"></div>
    <div class="subtitle">五四学制 · 新教材版</div>
  </header>

  <div class="grade-selector" id="gradeSelector">
    <button data-grade="1">一年级</button>
    <button data-grade="2">二年级</button>
    <button data-grade="3">三年级</button>
    <button data-grade="4">四年级</button>
    <button data-grade="5">五年级</button>
  </div>
  <div class="grade-selector category-selector" id="categorySelector">
    <button data-grade="travel">✈️ 旅游英语</button>
    <button data-grade="daily">🏠 日常生活</button>
  </div>

  <div class="mode-selector" id="modeSelector">
    <button data-mode="know" class="active">📖 认识</button>
    <button data-mode="read">🎤 跟读</button>
    <button data-mode="spell">🧠 拼读</button>
  </div>

  <div class="progress-section">
    <span>⭐ 进度</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <span class="progress-text" id="progressText">0/20</span>
  </div>

  <div class="card-area" id="cardArea">
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <h2 id="resultTitle">完成！</h2>
    <div class="result-score" id="resultScore">0</div>
    <div style="font-size:14px;color:#999;margin-bottom:12px;">个单词已掌握</div>
    <div class="result-detail" id="resultDetail"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;">
      <button class="btn-reset" onclick="location.reload()">🔄 重新开始</button>
      <button class="btn-reset" id="btnReviewWrong" style="border-color:#ffd700;color:#ffd700;">📕 复习错题</button>
    </div>
  </div>

  <div class="footer">每天 20 个单词，积少成多 ✨</div>
</div>

// ---------- 工具函数 ----------
function getDateStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function shuffle(arr, rand) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- 语音识别 ----------
let _recogAvailable = false;

(function checkSpeechRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  _recogAvailable = !!SR;
})();

function createRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  var r = new SR();
  r.lang = 'en-US';
  r.interimResults = false;
  r.continuous = false;
  r.maxAlternatives = 3;
  return r;
}

var _recognition = null;
var _isListening = false;
var _listenTimeout = null;

function startListening(onResult, onEnd) {
  if (_isListening) return;
  if (!_recogAvailable) {
    if (onEnd) onEnd('unsupported');
    return;
  }
  try {
    _recognition = createRecognition();
    if (!_recognition) {
      if (onEnd) onEnd('unsupported');
      return;
    }
    _isListening = true;
    // 超时保护：10秒后自动停止
    _listenTimeout = setTimeout(function() {
      if (_isListening) {
        try { _recognition.abort(); } catch(e) {}
        _isListening = false;
        if (onEnd) onEnd('timeout');
      }
    }, 10000);

    _recognition.onresult = function(e) {
      clearTimeout(_listenTimeout);
      _isListening = false;
      var texts = [];
      for (var i = e.results[0].length - 1; i >= 0; i--) {
        texts.push(e.results[0][i].transcript.trim().toLowerCase());
      }
      if (onResult) onResult(texts);
    };
    _recognition.onerror = function(e) {
      clearTimeout(_listenTimeout);
      _isListening = false;
      if (onEnd) onEnd(e.error === 'no-speech' ? 'no-speech' : 'error');
    };
    _recognition.onend = function() {
      clearTimeout(_listenTimeout);
      if (_isListening) {
        _isListening = false;
        if (onEnd) onEnd('end');
      }
    };
    _recognition.start();
  } catch(e) {
    clearTimeout(_listenTimeout);
    _isListening = false;
    if (onEnd) onEnd('error');
  }
}

function stopListening() {
  clearTimeout(_listenTimeout);
  if (_recognition && _isListening) {
    try { _recognition.abort(); } catch(e) {}
    _isListening = false;
  }
}

function isWordMatch(spoken, target) {
  var t = target.toLowerCase().trim();
  for (var i = 0; i < spoken.length; i++) {
    var s = spoken[i].toLowerCase().trim().replace(/[^a-z\s]/g, '');
    if (s === t) return true;
    if (s.indexOf(t) !== -1) return true;
    if (t.indexOf(s) !== -1 && s.length > 1) return true;
    // 简单编辑距离检查容错
    if (Math.abs(s.length - t.length) <= 2) {
      var dist = 0;
      var len = Math.min(s.length, t.length);
      for (var k = 0; k < len; k++) {
        if (s[k] !== t[k]) dist++;
      }
      dist += Math.abs(s.length - t.length);
      var threshold = Math.max(1, Math.floor(t.length * 0.35));
      if (dist <= threshold) return true;
    }
  }
  return false;
}

// ---------- 初始化 ----------
function init() {
  document.querySelectorAll('.grade-selector button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.grade-selector button').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentGrade = this.dataset.grade;
      startGame();
    });
  });
  document.querySelectorAll('.mode-selector button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mode-selector button').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentMode = this.dataset.mode;
      startGame();
    });
  });
  document.querySelector('.grade-selector button[data-grade="1"]').classList.add('active');
  startGame();
}

let _lastRealGrade = '1';

function startGame() {
  const dateStr = getDateStr();
  document.getElementById('dateDisplay').textContent = dateStr + '  ·  今天也要加油哦 💪';

  // 如果是复习模式，回退到上次的年级
  if (currentGrade === 'review') {
    currentGrade = _lastRealGrade;
    document.querySelector(`.grade-selector button[data-grade="${_lastRealGrade}"]`)?.classList.add('active');
  } else if (currentGrade !== 'travel' && currentGrade !== 'daily') {
    _lastRealGrade = currentGrade;
  }

  const seed = hashStr(dateStr + '-grade' + currentGrade);
  const rand = seededRandom(seed);

  const words = WORDS_BY_GRADE[currentGrade] || [];

  if (words.length === 0) {
    document.getElementById('cardArea').innerHTML = `
      <div class="empty-state">
        <div class="icon">📚</div>
        <p>该分类暂未录入单词<br>请选择其他分类</p>
      </div>
    `;
    document.getElementById('resultSection').classList.remove('active');
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '0/20';
    return;
  }

  const unique = [];
  const seen = new Set();
  for (const w of words) {
    const key = w.en.toLowerCase() + '|' + w.cn;
    if (!seen.has(key)) {
      seen.add(key);
      unique.push(w);
    }
  }

  const count = Math.min(20, unique.length);
  todayWords = shuffle(unique, rand).slice(0, count);
  currentIndex = 0;
  knownCount = 0;
  results = todayWords.map(w => ({ en: w.en, cn: w.cn, known: false }));

  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('resultSection').classList.remove('active');
  renderCard(0);
  updateProgress();
}

// ===== 跟读模式 =====
function renderReadCard(area, index, w) {
  var srNote = _recogAvailable ? '' : '<div class="speech-supported-note">⚠️ 当前浏览器不支持语音识别，请使用 Chrome</div>';
  area.innerHTML =
    '<div class="card active">' +
      '<div class="word-number">第 ' + (index+1) + ' / ' + todayWords.length + ' 个</div>' +
      '<div class="word-english">' + w.en + '</div>' +
      '<div class="word-phonetic">' + (w.phonetic || '') + '</div>' +
      '<div class="word-chinese" style="opacity:1">' + w.cn + '</div>' +
      '<div class="mic-area">' +
        '<button class="mic-btn" id="micBtn">🎤</button>' +
      '</div>' +
      '<div class="speech-status" id="speechStatus">🔊 正在播放发音...</div>' +
      '<div class="speech-result" id="speechResult"></div>' +
      '<div class="retry-area" id="retryArea"></div>' +
      srNote +
    '</div>';

  // 先播放发音，播完后启动录音
  speak(w.en);
  setTimeout(function() { startReadListen(index, w); }, 1200);
}

function startReadListen(index, w) {
  if (index !== currentIndex) return;
  var micBtn = document.getElementById('micBtn');
  var status = document.getElementById('speechStatus');
  if (!micBtn) return;

  micBtn.classList.add('listening');
  status.textContent = '🎤 请跟读...';

  startListening(
    function(texts) {
      if (index !== currentIndex) return;
      micBtn.classList.remove('listening');
      var retryArea = document.getElementById('retryArea');
      var resultEl = document.getElementById('speechResult');

      if (isWordMatch(texts, w.en)) {
        micBtn.classList.add('success');
        micBtn.textContent = '✅';
        status.textContent = '🎉 读对了！太棒了！';
        resultEl.textContent = '你读的: ' + texts[0];
        retryArea.innerHTML = '<button class="btn-next-word" onclick="advanceRead(' + index + ',true)">➡️ 下一个</button>';
      } else {
        micBtn.classList.add('fail');
        micBtn.textContent = '🔄';
        status.textContent = '🤔 再试试？';
        resultEl.textContent = '你读的: ' + texts[0];
        retryArea.innerHTML =
          '<button class="btn-retry" onclick="retryRead(' + index + ')">🔁 再读一次</button>' +
          '<button class="btn-next-word" onclick="advanceRead(' + index + ',false)">➡️ 下一个</button>';
      }
    },
    function(reason) {
      if (index !== currentIndex) return;
      micBtn.classList.remove('listening');
      if (reason === 'unsupported') {
        status.textContent = '⚠️ 当前浏览器不支持语音识别，请使用 Chrome';
        micBtn.style.display = 'none';
      } else if (reason === 'timeout') {
        status.textContent = '⏱️ 没听到声音，点击重试';
        showRetryButtons(index, false, w.en);
      } else if (reason === 'no-speech') {
        status.textContent = '🔇 没听到声音，请重试';
        showRetryButtons(index, false, w.en);
      }
    }
  );
}

function retryRead(index) {
  if (index !== currentIndex) return;
  var micBtn = document.getElementById('micBtn');
  var status = document.getElementById('speechStatus');
  var resultEl = document.getElementById('speechResult');
  var retryArea = document.getElementById('retryArea');
  if (!micBtn) return;

  micBtn.classList.remove('success', 'fail');
  micBtn.style.display = '';
  micBtn.textContent = '🎤';
  resultEl.textContent = '';
  retryArea.innerHTML = '';
  startReadListen(index, todayWords[index]);
}

function advanceRead(index, known) {
  if (index !== currentIndex) return;
  results[currentIndex].known = known;
  if (known) knownCount++;
  currentIndex++;
  renderCard(currentIndex);
  updateProgress();
}

        status.textContent = '⚠️ 当前浏览器不支持语音识别，请使用 Chrome';
        micBtn.style.display = 'none';
      } else if (reason === 'timeout') {
        status.textContent = '⏱️ 没听到声音，点击重试';
        showRetryButtons(index, true, w.en);
      } else if (reason === 'no-speech') {
        status.textContent = '🔇 没听到声音，请重试';
        showRetryButtons(index, true, w.en);
      }
    }
  );
}

function retrySpell(index) {
  if (index !== currentIndex) return;
  var micBtn = document.getElementById('micBtn');
  var status = document.getElementById('speechStatus');
  var resultEl = document.getElementById('speechResult');
  var retryArea = document.getElementById('retryArea');
  if (!micBtn) return;

  micBtn.classList.remove('success', 'fail');
  micBtn.style.display = '';
  micBtn.textContent = '🎤';
  resultEl.textContent = '';
  retryArea.innerHTML = '';
  if (engEl) {
    engEl.textContent = '点击下方🔍查看';
    engEl.style.opacity = '0.3';
    engEl.style.fontSize = '28px';
  }
  startSpellListen(index, todayWords[index]);
}

function showRetryButtons(index, isSpell, word) {
  var retryArea = document.getElementById('retryArea');
  if (!retryArea) return;
  if (isSpell) {
    retryArea.innerHTML =
      '<button class="btn-retry" onclick="retrySpell(' + index + ')">🔁 再试一次</button>' +
      '<button class="btn-next-word" onclick="advanceRead(' + index + ',false)">➡️ 跳过</button>';
  } else {
    retryArea.innerHTML =
      '<button class="btn-retry" onclick="retryRead(' + index + ')">🔁 再读一次</button>' +
      '<button class="btn-next-word" onclick="advanceRead(' + index + ',false)">➡️ 跳过</button>';
  }
}

function renderCard(index) {
  stopListening();
  const area = document.getElementById('cardArea');
  if (index >= todayWords.length) {
    showResult();
    return;
  }
  const w = todayWords[index];

  if (currentMode === 'read') {
    renderReadCard(area, index, w);
    return;
  }
  if (currentMode === 'spell') {
    renderSpellCard(area, index, w);
    return;
  }
  renderKnowCard(area, index, w);
}

function renderKnowCard(area, index, w) {
  area.innerHTML = `
    <div class="card active">
      <div class="word-number">第 ${index+1} / ${todayWords.length} 个</div>
      <div class="word-english" id="wordEnglish">${w.en}</div>
      <div class="word-phonetic">${w.phonetic || ''}</div>
      <button class="btn-sound" id="btnSound">🔊</button>
      <div class="word-chinese hidden" id="wordChinese">${w.cn}</div>
      <div class="hint-text">👆 点击英文或点击喇叭听发音</div>
      <div class="actions">
        <button class="btn-know" id="btnKnow">😊 知道了</button>
        <button class="btn-dunno" id="btnDunno">😅 不认识</button>
      </div>
    </div>
  `;

  document.getElementById('wordEnglish').addEventListener('click', function() {
    document.getElementById('wordChinese').classList.remove('hidden');
    speak(todayWords[currentIndex].en);
  });

  document.getElementById('btnSound').addEventListener('click', function() {
    speak(todayWords[currentIndex].en);
  });

  document.getElementById('btnKnow').addEventListener('click', function() {
    results[currentIndex].known = true;
    knownCount++;
    currentIndex++;
    renderCard(currentIndex);
    updateProgress();
  });

  document.getElementById('btnDunno').addEventListener('click', function() {
    results[currentIndex].known = false;
    currentIndex++;
    renderCard(currentIndex);
    updateProgress();
  });
}

function speak(text) {
  // 先用音频方式（兼容性好，支持所有浏览器）
  // 如果音频失败再用 speechSynthesis 兜底
  tryPlayAudio(text, function() {
    if (window.speechSynthesis) {
      try {
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.85;
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
        window.speechSynthesis.speak(u);
        // Android 需要额外 resume
        if (navigator.userAgent.indexOf('Android') !== -1) {
          window.speechSynthesis.resume();
        }
      } catch(e) {}
    }
  });
}
function tryPlayAudio(text, fallback) {
  var audio = document.getElementById('ttsAudio');
  if (!audio) {
    audio = document.createElement('audio');
    audio.id = 'ttsAudio';
    audio.style.display = 'none';
    document.body.appendChild(audio);
  }
  audio.src = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=0';
  audio.play().catch(function() {
    audio.src = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=' + encodeURIComponent(text);
    audio.play().catch(function(e) {
      if (fallback) fallback();
    });
  });
}

function updateProgress() {
  const total = todayWords.length || 20;
  const pct = Math.min((currentIndex / total) * 100, 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${Math.min(currentIndex, total)}/${total}`;
}

// ---------- localStorage ----------
function saveProgress() {
  try {
    const data = {
      date: getDateStr(),
      grade: currentGrade,
      wrongWords: JSON.parse(localStorage.getItem('dew_wrong') || '{}')
    };
    const wrong = results.filter(r => !r.known).map(r => ({ en: r.en, cn: r.cn }));
    if (wrong.length > 0) {
      const key = getDateStr() + '_' + currentGrade;
      data.wrongWords[key] = (data.wrongWords[key] || []).concat(wrong);
      data.wrongWords[key] = data.wrongWords[key].slice(-50);
    }
    localStorage.setItem('dew_wrong', JSON.stringify(data.wrongWords));
    localStorage.setItem('dew_last', JSON.stringify({ date: data.date, grade: currentGrade }));
  } catch(e) {}
}

function loadWrongWords() {
  try {
    return JSON.parse(localStorage.getItem('dew_wrong') || '{}');
  } catch(e) { return {}; }
}

// ---------- 复习错题 ----------
function startReviewWrong() {
  const allWrong = loadWrongWords();
  const wrongList = [];
  for (const key in allWrong) {
    for (const w of allWrong[key]) {
      if (!wrongList.some(x => x.en === w.en)) wrongList.push(w);
    }
  }
  if (wrongList.length === 0) {
    alert('🎉 没有错题，太棒了！');
    return;
  }
  currentGrade = 'review';
  document.getElementById('gradeSelector').querySelectorAll('button').forEach(b => b.classList.remove('active'));
  document.getElementById('resultSection').classList.remove('active');
  document.getElementById('cardArea').style.display = 'block';

  const count = Math.min(20, wrongList.length);
  const rand = seededRandom(hashStr('review-' + getDateStr()));
  todayWords = shuffle(wrongList, rand).slice(0, count);
  currentIndex = 0;
  knownCount = 0;
  results = todayWords.map(w => ({ en: w.en, cn: w.cn, known: false }));
  renderCard(0);
  updateProgress();
}

function getWrongWordsForReview() {
  if (results.length === 0) return [];
  const wrong = results.filter(r => !r.known).map(r => ({ en: r.en, cn: r.cn }));
  const allWrong = loadWrongWords();
  const key = getDateStr() + '_' + currentGrade;
  if (wrong.length > 0) {
    allWrong[key] = (allWrong[key] || []).concat(wrong);
    allWrong[key] = allWrong[key].slice(-50);
  }
  localStorage.setItem('dew_wrong', JSON.stringify(allWrong));
  return wrong;
}

function showResult() {
  document.getElementById('cardArea').style.display = 'none';
  const section = document.getElementById('resultSection');
  section.classList.add('active');

  const score = knownCount;
  const total = todayWords.length;
  document.getElementById('resultScore').textContent = score;

  if (score === total) {
    document.getElementById('resultEmoji').textContent = '🎉🏆🎉';
    document.getElementById('resultTitle').textContent = '太棒了！全部掌握！';
  } else if (score >= Math.ceil(total * 0.7)) {
    document.getElementById('resultEmoji').textContent = '🌟👏🌟';
    document.getElementById('resultTitle').textContent = '做得好！继续加油！';
  } else if (score >= Math.ceil(total * 0.5)) {
    document.getElementById('resultEmoji').textContent = '💪😊💪';
    document.getElementById('resultTitle').textContent = '还不错，多复习哦！';
  } else {
    document.getElementById('resultEmoji').textContent = '📖🤗📖';
    document.getElementById('resultTitle').textContent = '没关系，明天再来！';
  }

  const detail = document.getElementById('resultDetail');
  detail.innerHTML = results.map(r => `
    <div class="result-word">
      <span class="en">${r.en}</span>
      <span class="cn">${r.cn}</span>
      <span class="status">${r.known ? '✅' : '🔄'}</span>
    </div>
  `).join('');

  // 保存进度
  saveProgress();

  // 复习错题按钮
  const reviewBtn = document.getElementById('btnReviewWrong');
  if (reviewBtn) {
    const wrong = results.filter(r => !r.known);
    reviewBtn.style.display = wrong.length > 0 ? 'inline-block' : 'none';
    reviewBtn.onclick = function() {
      getWrongWordsForReview();
      startReviewWrong();
      reviewBtn.style.display = 'none';
    };
  }
}

// ---------- 深色模式 ----------
function initDarkMode() {
  const toggle = document.getElementById('darkToggle');
  const saved = localStorage.getItem('dew_dark');
  if (saved === '1') {
    document.body.classList.add('dark');
    toggle.textContent = '☀️';
  }
  toggle.addEventListener('click', function() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    toggle.textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('dew_dark', isDark ? '1' : '0');
  });
}

// ---------- 键盘快捷键 ----------
function initKeyboard() {
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.key >= '1' && e.key <= '5') {
      const btn = document.querySelector(`.grade-selector button[data-grade="${e.key}"]`);
      if (btn) { btn.click(); e.preventDefault(); }
      return;
    }

    const resultActive = document.getElementById('resultSection').classList.contains('active');
    if (resultActive) {
      if (e.key === 'Enter' || e.key === ' ') {
        const reviewBtn = document.getElementById('btnReviewWrong');
        if (reviewBtn && reviewBtn.style.display !== 'none') { reviewBtn.click(); e.preventDefault(); }
      }
      return;
    }

    const card = document.querySelector('.card.active');
    if (!card) return;

    if (currentMode === 'know') {
      if (e.key === 'Enter' || e.key === ' ') {
        const btn = document.getElementById('btnKnow');
        if (btn) { btn.click(); e.preventDefault(); }
      } else if (e.key === 'x' || e.key === 'X') {
        const btn = document.getElementById('btnDunno');
        if (btn) { btn.click(); e.preventDefault(); }
      } else if (e.key === 'a' || e.key === 'A') {
        const btn = document.getElementById('btnSound');
        if (btn) { btn.click(); e.preventDefault(); }
      }
    } else if (currentMode === 'read' || currentMode === 'spell') {
      if (e.key === 'r' || e.key === 'R') {
        const btn = document.querySelector('.btn-retry');
        if (btn) { btn.click(); e.preventDefault(); }
      } else if (e.key === 'Enter' || e.key === ' ') {
        const btn = document.querySelector('.btn-next-word');
        if (btn) { btn.click(); e.preventDefault(); }
      }
    }

    // 模式切换
    if (e.key === 'k' || e.key === 'K') {
      const btn = document.querySelector('.mode-selector button[data-mode="know"]');
      if (btn && currentMode !== 'know') { btn.click(); e.preventDefault(); }
    } else if (e.key === 'r' && (e.ctrlKey || e.metaKey)) {
      // Ctrl+R is reserved for browser refresh, skip
    } else if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
      // Ctrl+S is reserved, skip
    }
  });
}

init();
initDarkMode();
initKeyboard();
</script>
