<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日英语单词 - 五四学制</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #333;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }
  header {
    text-align: center;
    padding: 16px 0 6px;
    color: #fff;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  header .date {
    font-size: 14px;
    opacity: 0.85;
    margin-top: 4px;
  }
  header .subtitle {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 2px;
  }
  .grade-selector {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 12px 0 8px;
    flex-wrap: wrap;
  }
  .grade-selector button {
    padding: 6px 16px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .grade-selector button:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .grade-selector button.active {
    background: #fff;
    color: #667eea;
    border-color: #fff;
  }
  .progress-section {
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 10px 16px;
    margin: 12px 0;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
    margin: 0 12px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #ffd700;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }
  .card-area {
    position: relative;
    min-height: 300px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 24px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .card.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .word-number {
    font-size: 14px;
    color: #999;
    margin-bottom: 16px;
  }
  .word-english {
    font-size: 40px;
    font-weight: 700;
    color: #333;
    margin: 16px 0;
    letter-spacing: 1px;
    cursor: pointer;
    user-select: none;
  }
  .word-phonetic {
    font-size: 16px;
    color: #999;
    margin-bottom: 6px;
  }
  .word-chinese {
    font-size: 28px;
    font-weight: 600;
    color: #667eea;
    margin: 14px 0 6px;
    min-height: 40px;
    transition: opacity 0.3s;
  }
  .word-chinese.hidden { opacity: 0; }
  .word-chinese:not(.hidden) { opacity: 1; }
  .hint-text {
    font-size: 13px;
    color: #bbb;
    margin-top: 6px;
  }
  .btn-sound {
    display: inline-block;
    background: #f0f0f5;
    border: none;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    line-height: 48px;
    font-size: 22px;
    cursor: pointer;
    margin: 8px 0;
    transition: background 0.2s;
  }
  .btn-sound:hover { background: #e0e0eb; }
  .btn-sound:active { transform: scale(0.95); }
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
  }
  .actions button {
    flex: 1;
    max-width: 160px;
    padding: 14px 0;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .actions button:active { transform: scale(0.96); }
  .btn-know { background: #52c41a; color: #fff; }
  .btn-dunno { background: #ff4d4f; color: #fff; }
  .btn-know:disabled, .btn-dunno:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-section {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: none;
  }
  .result-section.active { display: block; animation: fadeIn 0.3s ease; }
  .result-section h2 { font-size: 22px; margin-bottom: 6px; }
  .result-emoji { font-size: 48px; margin-bottom: 6px; }
  .result-score { font-size: 44px; font-weight: 700; color: #667eea; }
  .result-detail { margin-top: 16px; text-align: left; max-height: 300px; overflow-y: auto; }
  .result-word {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 15px;
  }
  .result-word .en { font-weight: 600; }
  .result-word .cn { color: #999; }
  .result-word .status { font-size: 18px; }
  .btn-reset {
    margin-top: 16px;
    padding: 12px 32px;
    border: 2px solid #667eea;
    border-radius: 14px;
    background: #fff;
    color: #667eea;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-reset:hover { background: #667eea; color: #fff; }
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-top: 16px;
  }
  .empty-state {
    background: #fff;
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { color: #999; font-size: 15px; line-height: 1.6; }
</style>

<div class="container">
  <header>
    <h1>📖 每日英语单词</h1>
    <div class="date" id="dateDisplay"></div>
    <div class="subtitle">五四学制 · 新教材版</div>
  </header>

  <div class="grade-selector" id="gradeSelector">
    <button data-grade="1">一年级</button>
    <button data-grade="2">二年级</button>
    <button data-grade="3">三年级</button>
    <button data-grade="4">四年级</button>
    <button data-grade="5">五年级</button>

    </div>

  <div class="card-area" id="cardArea">
  </div>

  <div class="result-section" id="resultSection">

  </div>

  <div class="footer">每天 20 个单词，积少成多 ✨</div>
</div>

// ---------- 工具函数 ----------
function getDateStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function shuffle(arr, rand) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- 主逻辑 ----------
let currentGrade = 1;
let todayWords = [];
let currentIndex = 0;
let knownCount = 0;
let results = [];

function init() {
  // 年级切换
  document.querySelectorAll('.grade-selector button').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.grade-selector button').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentGrade = parseInt(this.dataset.grade);
      startGame();
    });
  });
  // 默认选中一年级
  document.querySelector('.grade-selector button[data-grade="1"]').classList.add('active');
  startGame();
}

function startGame() {
  const dateStr = getDateStr();
  document.getElementById('dateDisplay').textContent = dateStr + '  ·  今天也要加油哦 💪';

  const seed = hashStr(dateStr + '-grade' + currentGrade);
  const rand = seededRandom(seed);

  const words = WORDS_BY_GRADE[currentGrade] || [];

  if (words.length === 0) {
    document.getElementById('cardArea').innerHTML = `
      <div class="empty-state">
        <div class="icon">📚</div>
        <p>该年级暂未录入单词<br>请选择其他年级</p>
      </div>
    `;
    document.getElementById('resultSection').classList.remove('active');
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '0/20';
    return;
  }

  // 去重
  const unique = [];
  const seen = new Set();
  for (const w of words) {
    const key = w.en.toLowerCase() + '|' + w.cn;
    if (!seen.has(key)) {
      seen.add(key);
      unique.push(w);
    }
  }

  const count = Math.min(20, unique.length);
  todayWords = shuffle(unique, rand).slice(0, count);
  currentIndex = 0;
  knownCount = 0;
  results = todayWords.map(w => ({ en: w.en, cn: w.cn, known: false }));

  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('resultSection').classList.remove('active');
  renderCard(0);
  updateProgress();
}

function renderCard(index) {
  const area = document.getElementById('cardArea');
  if (index >= todayWords.length) {
    showResult();
    return;
  }
  const w = todayWords[index];
  area.innerHTML = `
    <div class="card active">
      <div class="word-number">第 ${index+1} / ${todayWords.length} 个</div>
      <div class="word-english" id="wordEnglish">${w.en}</div>
      <div class="word-phonetic">${w.phonetic || ''}</div>
      <button class="btn-sound" id="btnSound">🔊</button>
      <div class="word-chinese hidden" id="wordChinese">${w.cn}</div>
      <div class="hint-text">👆 点击英文或点击喇叭听发音</div>
      <div class="actions">
        <button class="btn-know" id="btnKnow">😊 知道了</button>
        <button class="btn-dunno" id="btnDunno">😅 不认识</button>
      </div>
    </div>
  `;

  document.getElementById('wordEnglish').addEventListener('click', function() {
    document.getElementById('wordChinese').classList.remove('hidden');
    speak(todayWords[currentIndex].en);
  });

  document.getElementById('btnSound').addEventListener('click', function() {
    speak(todayWords[currentIndex].en);
  });

  document.getElementById('btnKnow').addEventListener('click', function() {
    results[currentIndex].known = true;
    knownCount++;
    currentIndex++;
    renderCard(currentIndex);
    updateProgress();
  });

  document.getElementById('btnDunno').addEventListener('click', function() {
    results[currentIndex].known = false;
    currentIndex++;
    renderCard(currentIndex);
    updateProgress();
  });

}

function speak(text) {
  if (window.speechSynthesis) {
    try {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.85;
      u.onerror = function(e) {
        console.log('SpeechSynthesis error, trying audio fallback', e);
        tryPlayAudio(text);
      };
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
      window.speechSynthesis.speak(u);
      return;
    } catch(e) {
      console.log('SpeechSynthesis exception, trying audio fallback', e);
    }
  }
  tryPlayAudio(text);
}
function tryPlayAudio(text) {
  var audio = document.getElementById('ttsAudio');
  if (!audio) {
    audio = document.createElement('audio');
    audio.id = 'ttsAudio';
    audio.style.display = 'none';
    document.body.appendChild(audio);
  }
  audio.src = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=0';
  audio.play().catch(function() {
    audio.src = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=' + encodeURIComponent(text);
    audio.play().catch(function(e) {
      console.log('所有发音方式均失败', e);
    });
  });
}

function updateProgress() {
  const total = todayWords.length || 10;
  const pct = Math.min((currentIndex / total) * 100, 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${Math.min(currentIndex, total)}/${total}`;
}

function showResult() {
  document.getElementById('cardArea').style.display = 'none';
  const section = document.getElementById('resultSection');
  section.classList.add('active');

  const score = knownCount;
  const total = todayWords.length;
  document.getElementById('resultScore').textContent = score;

  if (score === total) {
    document.getElementById('resultEmoji').textContent = '🎉🏆🎉';
    document.getElementById('resultTitle').textContent = '太棒了！全部掌握！';
  } else if (score >= Math.ceil(total * 0.7)) {
    document.getElementById('resultEmoji').textContent = '🌟👏🌟';
    document.getElementById('resultTitle').textContent = '做得好！继续加油！';
  } else if (score >= Math.ceil(total * 0.5)) {
    document.getElementById('resultEmoji').textContent = '💪😊💪';
    document.getElementById('resultTitle').textContent = '还不错，多复习哦！';
  } else {
    document.getElementById('resultEmoji').textContent = '📖🤗📖';
    document.getElementById('resultTitle').textContent = '没关系，明天再来！';
  }

  const detail = document.getElementById('resultDetail');
  detail.innerHTML = results.map(r => `
    <div class="result-word">
      <span class="en">${r.en}</span>
      <span class="cn">${r.cn}</span>
      <span class="status">${r.known ? '✅' : '🔄'}</span>
    </div>
  `).join('');
}

init();
</script>
</body>
</html>
